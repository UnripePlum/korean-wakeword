name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Check manifest
        run: python scripts/manifest/generate.py --check
